{% extends "layouts/auth_base.html" %}
{% block title %}Sign In — Silicon Oracle{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-sm">

        <!-- Logo -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-14 h-14 rounded-xl bg-oracle-accent/20 border border-oracle-primary/30 mb-4">
                <svg class="w-8 h-8 text-oracle-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-tight">Silicon Oracle</h1>
            <p class="text-xs text-oracle-border-strong font-mono mt-1">AI-Powered Market Intelligence</p>
        </div>

        <!-- Card -->
        <div class="t-card">
            <p class="text-sm font-semibold text-white mb-4">Sign In</p>
            <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-3">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                <div>
                    <label class="section-label block mb-1" for="email">Email</label>
                    <input type="email" name="email" id="email" placeholder="you@example.com" required autocomplete="email"
                           class="t-input w-full">
                </div>

                <div>
                    <label class="section-label block mb-1" for="password">Password</label>
                    <input type="password" name="password" id="password" placeholder="••••••••" required autocomplete="current-password"
                           class="t-input w-full">
                </div>

                <button type="submit" class="btn btn-primary w-full mt-1">Sign In</button>
            </form>

            <p class="text-center text-xs text-oracle-border-strong mt-4">
                No account?
                <a href="{{ url_for('auth.signup') }}" class="text-oracle-primary hover:text-oracle-accent transition-colors font-medium">Sign Up</a>
            </p>
        </div>

        <!-- Feature strip -->
        <div class="grid grid-cols-3 gap-2 mt-4 text-center">
            <div class="py-2 px-1 bg-oracle-surface/60 rounded-lg border border-oracle-border">
                <p class="text-[10px] text-oracle-border-strong font-mono">Real-Time</p>
                <p class="text-[10px] text-white mt-0.5">Market Data</p>
            </div>
            <div class="py-2 px-1 bg-oracle-surface/60 rounded-lg border border-oracle-border">
                <p class="text-[10px] text-oracle-border-strong font-mono">AI-Powered</p>
                <p class="text-[10px] text-white mt-0.5">Analysis</p>
            </div>
            <div class="py-2 px-1 bg-oracle-surface/60 rounded-lg border border-oracle-border">
                <p class="text-[10px] text-oracle-border-strong font-mono">Paper</p>
                <p class="text-[10px] text-white mt-0.5">Trading</p>
            </div>
        </div>

        <p class="text-center text-[10px] text-oracle-border font-mono mt-6">Silicon Oracle v2.0</p>
    </div>
</div>
{% endblock %}
