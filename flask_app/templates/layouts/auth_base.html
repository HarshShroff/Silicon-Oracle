<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Silicon Oracle{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/tailwind.css') }}">
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}" type="image/x-icon">
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-oracle-base text-gray-100 min-h-screen font-sans antialiased">

    <!-- Grid backdrop -->
    <div class="fixed inset-0 pointer-events-none" style="background-image: linear-gradient(rgba(30,45,61,0.07) 1px, transparent 1px), linear-gradient(90deg, rgba(30,45,61,0.07) 1px, transparent 1px); background-size: 40px 40px;"></div>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div x-data="{ show: true }" x-show="show" x-init="setTimeout(() => show = false, 5000)"
         x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-y-2" x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-200" x-transition:leave-start="opacity-100" x-transition:leave-end="opacity-0"
         class="fixed top-4 right-4 z-50 w-full max-w-sm space-y-2">
        {% for category, message in messages %}
        <div class="t-card flex items-center gap-3 {% if category == 'success' %}border-oracle-gain/40{% elif category == 'error' %}border-oracle-loss/40{% endif %}">
            <span class="text-sm flex-1 text-white">{{ message }}</span>
            <button @click="show = false" class="text-oracle-border-strong hover:text-white transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <!-- Content -->
    <div class="relative min-h-screen flex flex-col">
        {% block content %}{% endblock %}
    </div>

    {% block extra_scripts %}{% endblock %}
</body>
</html>
