{# Badge Component - Status indicators and labels #}

{% macro badge(text, variant='info', size='md', class='') %}
  <span class="
    inline-flex items-center font-medium rounded-full
    {% if variant == 'success' %}
      bg-green-500/10 text-green-400 border border-green-500/20
    {% elif variant == 'danger' %}
      bg-red-500/10 text-red-400 border border-red-500/20
    {% elif variant == 'warning' %}
      bg-yellow-500/10 text-yellow-400 border border-yellow-500/20
    {% elif variant == 'info' %}
      bg-blue-500/10 text-blue-400 border border-blue-500/20
    {% elif variant == 'primary' %}
      bg-oracle-primary/10 text-oracle-primary border border-oracle-primary/20
    {% elif variant == 'neutral' %}
      bg-gray-500/10 text-gray-400 border border-gray-500/20
    {% endif %}

    {% if size == 'sm' %}
      px-2 py-0.5 text-xs
    {% elif size == 'lg' %}
      px-4 py-1.5 text-base
    {% else %}
      px-3 py-1 text-sm
    {% endif %}

    {{ class }}
  ">
    {{ text }}
  </span>
{% endmacro %}

{% macro badge_with_icon(text, variant='info', size='md', icon='', class='') %}
  <span class="
    inline-flex items-center gap-1.5 font-medium rounded-full
    {% if variant == 'success' %}
      bg-green-500/10 text-green-400 border border-green-500/20
    {% elif variant == 'danger' %}
      bg-red-500/10 text-red-400 border border-red-500/20
    {% elif variant == 'warning' %}
      bg-yellow-500/10 text-yellow-400 border border-yellow-500/20
    {% elif variant == 'info' %}
      bg-blue-500/10 text-blue-400 border border-blue-500/20
    {% elif variant == 'primary' %}
      bg-oracle-primary/10 text-oracle-primary border border-oracle-primary/20
    {% endif %}

    {% if size == 'sm' %}
      px-2 py-0.5 text-xs
    {% elif size == 'lg' %}
      px-4 py-1.5 text-base
    {% else %}
      px-3 py-1 text-sm
    {% endif %}

    {{ class }}
  ">
    {% if icon %}
      <span class="{% if size == 'sm' %}w-3 h-3{% elif size == 'lg' %}w-5 h-5{% else %}w-4 h-4{% endif %}">
        {{ icon|safe }}
      </span>
    {% endif %}
    {{ text }}
  </span>
{% endmacro %}
