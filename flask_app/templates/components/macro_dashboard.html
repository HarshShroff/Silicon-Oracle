<!-- Global Macro Dashboard - Sticky Ticker Tape -->
<div class="bg-gradient-to-r from-gray-900 to-gray-800 text-white py-3 px-4 shadow-lg sticky top-0 z-40" x-data="macroData()">
    <div class="max-w-7xl mx-auto">
        <div class="flex items-center justify-between">
            <!-- Title -->
            <div class="flex items-center space-x-2">
                <!-- <span class="text-xl font-bold">🌍</span> -->
                <span class="text-sm font-semibold hidden sm:block">GLOBAL MACRO</span>
            </div>

            <!-- Ticker Tape -->
            <div class="flex items-center space-x-6 overflow-x-auto scrollbar-hide">
                <!-- SPY -->
                <div class="flex items-center space-x-2">
                    <span class="text-xs text-gray-400">SPY</span>
                    <span class="text-sm font-bold" :class="spy.change >= 0 ? 'text-green-400' : 'text-red-400'" x-text="'$' + spy.price"></span>
                    <span class="text-xs" :class="spy.change >= 0 ? 'text-green-400' : 'text-red-400'" x-text="(spy.change >= 0 ? '+' : '') + spy.change + '%'"></span>
                </div>

                <!-- VIX -->
                <div class="flex items-center space-x-2">
                    <span class="text-xs text-gray-400">VIX</span>
                    <span class="text-sm font-bold" :class="vix.value > 20 ? 'text-red-400' : 'text-green-400'" x-text="vix.value"></span>
                    <span class="text-xs" x-text="vix.label"></span>
                </div>

                <!-- 10Y Yield -->
                <div class="flex items-center space-x-2">
                    <span class="text-xs text-gray-400">10Y</span>
                    <span class="text-sm font-bold text-yellow-400" x-text="yield10y.value + '%'"></span>
                    <span class="text-xs" :class="yield10y.change >= 0 ? 'text-green-400' : 'text-red-400'" x-text="(yield10y.change >= 0 ? '+' : '') + yield10y.change + 'bps'"></span>
                </div>

                <!-- DXY (Dollar) -->
                <div class="flex items-center space-x-2">
                    <span class="text-xs text-gray-400">DXY</span>
                    <span class="text-sm font-bold text-blue-400" x-text="dxy.value"></span>
                    <span class="text-xs" :class="dxy.change >= 0 ? 'text-green-400' : 'text-red-400'" x-text="(dxy.change >= 0 ? '+' : '') + dxy.change + '%'"></span>
                </div>

                <!-- BTC -->
                <div class="flex items-center space-x-2">
                    <span class="text-xs text-gray-400">BTC</span>
                    <span class="text-sm font-bold text-orange-400" x-text="'$' + btc.price"></span>
                    <span class="text-xs" :class="btc.change >= 0 ? 'text-green-400' : 'text-red-400'" x-text="(btc.change >= 0 ? '+' : '') + btc.change + '%'"></span>
                </div>

                <!-- Gold -->
                <div class="flex items-center space-x-2">
                    <span class="text-xs text-gray-400">GOLD</span>
                    <span class="text-sm font-bold text-yellow-300" x-text="'$' + gold.price"></span>
                    <span class="text-xs" :class="gold.change >= 0 ? 'text-green-400' : 'text-red-400'" x-text="(gold.change >= 0 ? '+' : '') + gold.change + '%'"></span>
                </div>

                <!-- Oil -->
                <div class="flex items-center space-x-2">
                    <span class="text-xs text-gray-400">OIL</span>
                    <span class="text-sm font-bold text-purple-400" x-text="'$' + oil.price"></span>
                    <span class="text-xs" :class="oil.change >= 0 ? 'text-green-400' : 'text-red-400'" x-text="(oil.change >= 0 ? '+' : '') + oil.change + '%'"></span>
                </div>
            </div>

            <!-- Refresh Button -->
            <button @click="fetchMacroData()" class="text-gray-400 hover:text-white transition">
                <svg class="w-5 h-5" :class="{'animate-spin': loading}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
                </svg>
            </button>
        </div>

        <!-- Context Message -->
        <div class="mt-2 text-xs text-gray-400 text-center" x-show="contextMessage">
            <span x-text="contextMessage"></span>
        </div>
    </div>
</div>

<script>
    function macroData() {
        return {
            loading: false,
            spy: {
                price: '500.00',
                change: 0
            },
            vix: {
                value: '15.0',
                label: 'Low Fear'
            },
            yield10y: {
                value: '4.25',
                change: 0
            },
            dxy: {
                value: '102.5',
                change: 0
            },
            btc: {
                price: '65,000',
                change: 0
            },
            gold: {
                price: '2,050',
                change: 0
            },
            oil: {
                price: '75.50',
                change: 0
            },
            contextMessage: '',

            init() {
                this.fetchMacroData();
                // Refresh every 5 minutes
                setInterval(() => this.fetchMacroData(), 300000);
            },

            async fetchMacroData() {
                this.loading = true;
                try {
                    const response = await fetch('/api/macro-data');
                    if (response.ok) {
                        const data = await response.json();
                        this.spy = data.spy || this.spy;
                        this.vix = data.vix || this.vix;
                        this.yield10y = data.yield10y || this.yield10y;
                        this.dxy = data.dxy || this.dxy;
                        this.btc = data.btc || this.btc;
                        this.gold = data.gold || this.gold;
                        this.oil = data.oil || this.oil;
                        this.updateContextMessage();
                    }
                } catch (error) {
                    console.error('Failed to fetch macro data:', error);
                } finally {
                    this.loading = false;
                }
            },

            updateContextMessage() {
                // Generate context based on macro conditions
                if (this.vix.value > 25) {
                    this.contextMessage = 'High volatility - Risk-off environment';
                } else if (this.yield10y.value > 4.5) {
                    this.contextMessage = 'Rising yields - Tech stocks under pressure';
                } else if (this.dxy.change > 1) {
                    this.contextMessage = 'Strong dollar - Commodities weakening';
                } else {
                    this.contextMessage = 'Stable macro conditions';
                }
            }
        }
    }
</script>

<style>
    .scrollbar-hide::-webkit-scrollbar {
        display: none;
    }
    
    .scrollbar-hide {
        -ms-overflow-style: none;
        scrollbar-width: none;
    }
</style>
