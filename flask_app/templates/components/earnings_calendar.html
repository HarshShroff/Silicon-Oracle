<!-- Earnings Calendar Component -->
<div class="glass rounded-2xl p-6" x-data="earningsCalendar()">
    <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-bold text-white">
            📅 Upcoming Earnings
        </h2>
        <button @click="fetchEarnings()" class="text-oracle-primary hover:text-blue-400">
            <svg class="w-5 h-5" :class="{'animate-spin': loading}" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path>
            </svg>
        </button>
    </div>

    <p class="text-sm text-gray-400 mb-4">
        ⚠️ <strong>Pro Tip:</strong> Beginners get crushed holding through earnings. Set alerts before the print.
    </p>

    <!-- Loading State -->
    <div x-show="loading" class="text-center py-12">
        <div class="inline-block animate-spin rounded-full h-12 w-12 border-b-2 border-oracle-primary"></div>
        <p class="mt-4 text-gray-400">Loading earnings data...</p>
    </div>

    <!-- No Data State -->
    <div x-show="!loading && earnings.length === 0" class="text-center py-12 bg-oracle-card rounded-lg">
        <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
        </svg>
        <p class="mt-4 text-gray-400">No upcoming earnings for your holdings</p>
    </div>

    <!-- Earnings List -->
    <div x-show="!loading && earnings.length > 0" class="space-y-3">
        <template x-for="earning in earnings" :key="earning.ticker">
            <div class="border border-oracle-border rounded-lg p-4 hover:shadow-md transition">
                <div class="flex items-center justify-between mb-2">
                    <div class="flex items-center space-x-3">
                        <h3 class="text-lg font-bold text-white" x-text="earning.ticker"></h3>
                        <span class="px-2 py-1 bg-blue-100 text-blue-400 text-xs font-semibold rounded">
                            <span x-text="earning.quarter"></span>
                        </span>
                    </div>
                    <span class="text-sm font-semibold text-gray-300" x-text="formatDate(earning.earnings_date)"></span>
                </div>

                <div class="grid grid-cols-2 gap-4 text-sm">
                    <div>
                        <p class="text-gray-500">EPS Estimate</p>
                        <p class="font-bold text-white">$<span x-text="earning.eps_estimate || 'N/A'"></span></p>
                    </div>
                    <div x-show="earning.eps_actual">
                        <p class="text-gray-500">EPS Actual</p>
                        <p class="font-bold" :class="earning.eps_actual > earning.eps_estimate ? 'text-green-600' : 'text-red-600'">
                            $<span x-text="earning.eps_actual"></span>
                        </p>
                    </div>
                </div>

                <!-- Days Until Earnings -->
                <div class="mt-3 pt-3 border-t border-oracle-border">
                    <div class="flex items-center justify-between text-xs">
                        <span class="text-gray-500">
                            <span x-text="getDaysUntil(earning.earnings_date)"></span>
                        </span>
                        <button @click="getAISummary(earning.ticker)" class="text-oracle-primary hover:text-blue-400 font-semibold">
                            🤖 AI Summary
                        </button>
                    </div>
                </div>

                <!-- AI Summary (expandable) -->
                <div x-show="earning.show_ai_summary" x-transition class="mt-3 p-3 bg-oracle-card rounded-lg text-sm">
                    <p class="text-gray-300" x-text="earning.ai_summary || 'Loading AI analysis...'"></p>
                </div>
            </div>
        </template>
    </div>
</div>

<script>
function earningsCalendar() {
    return {
        earnings: [],
        loading: false,

        init() {
            this.fetchEarnings();
        },

        async fetchEarnings() {
            this.loading = true;
            try {
                const response = await fetch('/api/earnings-calendar');
                if (response.ok) {
                    this.earnings = await response.json();
                    this.earnings.forEach(e => e.show_ai_summary = false);
                }
            } catch (error) {
                console.error('Failed to fetch earnings:', error);
            } finally {
                this.loading = false;
            }
        },

        formatDate(dateStr) {
            if (!dateStr) return 'TBD';
            const date = new Date(dateStr);
            return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        },

        getDaysUntil(dateStr) {
            if (!dateStr) return 'Date TBD';
            const today = new Date();
            const earnings = new Date(dateStr);
            const days = Math.ceil((earnings - today) / (1000 * 60 * 60 * 24));

            if (days < 0) return 'Already reported';
            if (days === 0) return 'Today!';
            if (days === 1) return 'Tomorrow';
            return `In ${days} days`;
        },

        async getAISummary(ticker) {
            const earning = this.earnings.find(e => e.ticker === ticker);
            if (!earning) return;

            earning.show_ai_summary = !earning.show_ai_summary;

            if (!earning.ai_summary) {
                try {
                    const response = await fetch(`/api/oracle/insight/${ticker}`);
                    if (response.ok) {
                        const data = await response.json();
                        earning.ai_summary = data.insight;
                    }
                } catch (error) {
                    earning.ai_summary = 'Failed to load AI summary';
                }
            }
        }
    }
}
</script>
