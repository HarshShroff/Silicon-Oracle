<!-- Sector Heatmap Component -->
<div class="grid grid-cols-3 gap-3">
    <template x-for="sector in ['Technology', 'Healthcare', 'Financials', 'Energy', 'Consumer', 'Industrials']" :key="sector">
        <div class="p-4 rounded-lg bg-[#131722]/80 border border-[#2A2E39] text-center hover:border-oracle-primary transition-colors">
            <div class="text-xs font-bold uppercase text-text-4 mb-2" x-text="sector"></div>
            <div class="text-2xl font-black" :class="Math.random() > 0.5 ? 'text-oracle-gain' : 'text-oracle-loss'" x-text="(Math.random() * 5 - 2.5).toFixed(2) + '%'"></div>
        </div>
    </template>
</div>
