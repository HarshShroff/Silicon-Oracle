name: Create Release

on:
  push:
    tags:
      - 'v*'

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Extract release notes
      id: extract_release
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.11"

    - name: Build distribution
      run: |
        python -m pip install --upgrade build
        python -m build

    - name: Create Release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref }}
        release_name: Release ${{ steps.extract_release.outputs.version }}
        body: |
          ## Silicon-Oracle ${{ steps.extract_release.outputs.version }}

          See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for detailed changes.

          ### Installation
          ```bash
          pip install silicon-oracle==${{ steps.extract_release.outputs.version }}
          ```

          ### Quick Start
          1. Clone and install: `pip install -e .`
          2. Set up `.env` with your API keys
          3. Run: `flask --app flask_app run`

          **[Full Changelog](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md)**
        draft: false
        prerelease: false

    - name: Upload dist artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist
        path: dist/
